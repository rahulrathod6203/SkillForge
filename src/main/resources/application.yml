spring:
  application:
    name: SkillForge
  main:
    banner-mode: off
  sql:
    init:
      mode: always


  # Database configuration (Brought out of application nesting)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Hibernate configuration
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
